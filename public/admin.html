<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administração | Naquele Lugar</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.Role !== 'Admin') {
            window.location.href = 'login.html';
        }
    </script>
</head>

<body class="admin-view management-body">
    <header class="mgmt-header">
        <div class="container mgmt-nav">
            <div class="logo">NAQUELE<span>ADMIN</span></div>
            <nav class="tabs">
                <button class="tab-link active" onclick="openTab('orders')">Pedidos</button>
                <button class="tab-link" onclick="openTab('products')">Produtos</button>
                <button class="tab-link" onclick="openTab('categories')">Categorias</button>
            </nav>
            <a href="kitchen.html" class="link-nav">Modo Cozinha</a>
        </div>
    </header>

    <main class="container">
        <div id="ordersTab" class="tab-content active">
            <section class="stats-section">
                <h2>Visão Geral de Hoje</h2>
                <div id="statsContainer" class="stats-grid"></div>
            </section>
            <section class="management-section">
                <h2>Gestão de Pedidos</h2>
                <div id="ordersContainer"></div>
            </section>
        </div>

        <div id="productsTab" class="tab-content">
            <section class="management-section">
                <div class="section-header">
                    <h2>Gestão de Produtos</h2>
                    <button class="btn btn-sm" onclick="openProductModal()">+ Novo Produto</button>
                </div>
                <div id="productsContainer"></div>
            </section>
        </div>
        <div id="categoriesTab" class="tab-content">
            <section class="management-section">
                <div class="section-header">
                    <h2>Gestão de Categorias</h2>
                    <button class="btn btn-sm" onclick="openCategoryModal()">+ Nova Categoria</button>
                </div>
                <div id="categoriesContainer"></div>
            </section>
        </div>
    </main>

    <div class="modal" id="productModal">
        <div class="modal-content">
            <h3 id="productModalTitle">Novo Produto</h3>
            <form id="productForm">
                <input type="hidden" id="prodId">
                <select id="prodCat" required></select>
                <input type="text" id="prodNome" placeholder="Nome do Produto" required>
                <textarea id="prodDesc" placeholder="Descrição"></textarea>
                <input type="number" id="prodPreco" placeholder="Preço (Ex: 15.00)" step="0.01" required>

                <div class="file-upload">
                    <label for="prodImgFile" class="btn btn-outline" style="width:100%; display:block; cursor:pointer">
                        📷 Selecionar Foto do Computador
                    </label>
                    <input type="file" id="prodImgFile" accept="image/*" style="display:none">
                    <input type="hidden" id="prodImg">
                    <div id="imagePreview" class="image-preview"></div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn btn-outline" onclick="closeModal('productModal')">Cancelar</button>
                    <button type="submit" class="btn">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal" id="categoryModal">
        <div class="modal-content">
            <h3 id="categoryModalTitle">Nova Categoria</h3>
            <form id="categoryForm">
                <input type="hidden" id="catId">
                <input type="text" id="catNome" placeholder="Nome da Categoria" required>
                <div class="modal-actions">
                    <button type="button" class="btn btn-outline"
                        onclick="closeModal('categoryModal')">Cancelar</button>
                    <button type="submit" class="btn">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>

</html>
