<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acompanhar Pedido - Naquele Lugar</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --text-color: #f5f5f5;
            --accent-red: #c41e3a;
            --accent-gold: #d4af37;
            --accent-orange: #ff8c00;
            --card-bg: #1a1a1a;
            --border: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, rgba(196, 30, 58, 0.05), transparent);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #fff, var(--accent-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: #888;
            letter-spacing: 1px;
        }

        .search-box {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.6);
            margin-bottom: 3rem;
            border-bottom: 3px solid var(--accent-red);
        }

        .input-group {
            position: relative;
            display: flex;
            gap: 1rem;
        }

        .input-group input {
            flex: 1;
            padding: 1.2rem 1.5rem;
            background: #252525;
            border: 1px solid #333;
            border-radius: 14px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: var(--accent-red);
            background: #2a2a2a;
            box-shadow: 0 0 15px rgba(196, 30, 58, 0.1);
        }

        .btn-search {
            padding: 0 2.5rem;
            background: var(--accent-red);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-search:hover {
            background: var(--accent-orange);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 140, 0, 0.3);
        }

        .results-container {
            display: none;
            margin-top: 2rem;
            animation: fadeIn 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .order-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 2rem;
            border-radius: 24px;
            margin-bottom: 1.5rem;
            transition: all 0.3s;
        }

        .order-card:hover {
            transform: scale(1.02);
            border-color: var(--accent-red);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        .order-id {
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--accent-gold);
            font-family: 'Playfair Display', serif;
        }

        .order-date {
            font-size: 0.9rem;
            color: #666;
        }

        .status-badge {
            padding: 0.5rem 1.2rem;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-pendente {
            background: rgba(85, 85, 85, 0.2);
            color: #888;
            border: 1px solid #555;
        }

        .status-em-preparo {
            background: rgba(255, 140, 0, 0.1);
            color: var(--accent-orange);
            border: 1px solid rgba(255, 140, 0, 0.3);
        }

        .status-pronto {
            background: rgba(76, 175, 80, 0.1);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        .status-entregue {
            background: rgba(148, 163, 184, 0.1);
            color: #94a3b8;
            border: 1px solid rgba(148, 163, 184, 0.3);
        }

        .order-details {
            margin-top: 1.5rem;
            font-size: 0.95rem;
            color: #aaa;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.7rem;
        }

        .total-row {
            border-top: 2px solid var(--accent-red);
            margin-top: 1.5rem;
            padding-top: 1rem;
            display: flex;
            justify-content: space-between;
            color: white;
            font-weight: 800;
            font-size: 1.3rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .empty-state {
            text-align: center;
            padding: 4rem;
            color: #666;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            color: var(--accent-red);
            opacity: 0.8;
        }

        .back-link {
            margin-top: 3rem;
            text-align: center;
        }

        .back-link a {
            color: #666;
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.3s;
            font-weight: 600;
        }

        .back-link a:hover {
            color: white;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Rastrear Pedido</h1>
            <p>Acompanhe o status da sua comida em tempo real</p>
        </header>

        <div class="search-box">
            <div class="input-group">
                <input type="text" id="searchInput" placeholder="Digite o Nº do Pedido ou seu Telefone">
                <button class="btn-search" onclick="searchOrders()">Buscar</button>
            </div>
        </div>

        <div id="results" class="results-container">
        </div>

        <div class="back-link">
            <a href="index.html"><i class="fa-solid fa-arrow-left"></i> Voltar para o Cardápio</a>
        </div>
    </div>

    <script src="tracking.js"></script>
</body>

</html>
