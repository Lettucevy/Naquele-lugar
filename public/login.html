<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Naquele Lugar</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --text-color: #f5f5f5;
            --accent-red: #c41e3a;
            --accent-orange: #ff8c00;
            --card-bg: #1a1a1a;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, rgba(196, 30, 58, 0.05), transparent);
            margin: 0;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(196, 30, 58, 0.2);
            padding: 3.5rem 3rem;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--accent-red), var(--accent-orange));
            border-radius: 24px 24px 0 0;
        }

        .login-card h1 {
            color: #fff;
            margin-bottom: 2rem;
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            color: #999;
            margin-bottom: 0.6rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 1rem;
            background: #252525;
            border: 1px solid #333;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .form-group input:focus {
            border-color: var(--accent-red);
            background: #2a2a2a;
            box-shadow: 0 0 15px rgba(196, 30, 58, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 1.1rem;
            background: var(--accent-red);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 1rem;
        }

        .login-btn:hover {
            background: var(--accent-orange);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 140, 0, 0.3);
        }

        .back-link {
            margin-top: 1.5rem;
            display: block;
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Acesso Restrito</h1>
        <form id="loginForm">
            <div class="form-group">
                <label for="usuario">Usuário</label>
                <input type="text" id="usuario" required placeholder="Digite seu usuário">
            </div>
            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" required placeholder="******">
            </div>
            <button type="submit" class="login-btn">Entrar</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const usuario = document.getElementById('usuario').value;
            const senha = document.getElementById('senha').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, senha })
                });

                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    Swal.fire({
                        icon: 'success',
                        title: 'Bem-vindo!',
                        text: `Logado como ${data.user.Role}`,
                        timer: 1500,
                        showConfirmButton: false
                    }).then(() => {
                        if (data.user.Role === 'Admin') window.location.href = 'admin.html';
                        else window.location.href = 'kitchen.html';
                    });
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Erro',
                        text: data.message
                    });
                }
            } catch (err) {
                console.error(err);
                Swal.fire({
                    icon: 'error',
                    title: 'Erro de conexão',
                    text: 'Não foi possível conectar ao servidor'
                });
            }
        });
    </script>
</body>
</html>
